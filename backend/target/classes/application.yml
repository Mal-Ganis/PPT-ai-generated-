spring:
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/ppt_ai
    username: ppt_user
    password: ppt_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
server:
  port: 8080

# 外部检索与向量 API（密钥请用环境变量或本机 application-local.yml，勿提交仓库）
# DEEPSEEK_API_KEY：大纲与幻灯片生成（必填）
# TAVILY_API_KEY / SILICONFLOW_API_KEY：检索与语义事实率（可选，未配则降级）
deepseek:
  api-key: ${DEEPSEEK_API_KEY:sk-846487c4b0854f4cbb0c9c314fa1c0c2}

tavily:
  api-key: ${TAVILY_API_KEY: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}
  # basic | advanced | fast | ultra-fast — advanced 召回更稳，适合中文主题验收
  search-depth: ${TAVILY_SEARCH_DEPTH:advanced}
  max-results: ${TAVILY_MAX_RESULTS:10}
  timeout-seconds: ${TAVILY_TIMEOUT_SECONDS:45}
  # fallback：仅 Tavily 失败或结果<2 时拉维基；supplement：Tavily 后再合并维基（中文要点与 ILF 对齐更好）
  wikipedia-mode: ${TAVILY_WIKIPEDIA_MODE:supplement}

siliconflow:
  api-key: ${SILICONFLOW_API_KEY:sk-agakamengqvkkveoxffueumfbdjvtbkdfidztxnhblchpzzt}

# 大纲：权威检索接入主流程（无 Tavily Key 时维基兜底仍可能命中）
outline:
  use-external-retrieval: ${OUTLINE_USE_EXTERNAL_RETRIEVAL:true}
  external-snippet-max-chars: ${OUTLINE_EXTERNAL_SNIPPET_MAX_CHARS:4800}
  external-result-limit: ${OUTLINE_EXTERNAL_RESULT_LIMIT:6}
  max-tokens: ${OUTLINE_MAX_TOKENS:4096}

# 正文生成：token 与 ILF-2 为空时的 Tavily 兜底
generation:
  # 略减单页输出 token，加快补全、降低超时概率
  slide-max-tokens: ${GENERATION_SLIDE_MAX_TOKENS:1536}
  slide-fallback-tavily: ${GENERATION_SLIDE_FALLBACK_TAVILY:true}
  slide-fallback-result-limit: ${GENERATION_SLIDE_FALLBACK_LIMIT:1}
  # 正文阶段专用模型（与大纲配置的 llmModel 独立）；优先 chat，避免 reasoner 拖长链路
  slide-model: ${GENERATION_SLIDE_MODEL:deepseek-chat}
  # 单页向量检索 topK 上限（与系统配置 retrievalLimit 取较小值）
  slide-retrieval-cap: ${GENERATION_SLIDE_RETRIEVAL_CAP:3}
  # Tavily 兜底写入 prompt 的摘要最大字符数
  slide-fallback-snippet-chars: ${GENERATION_SLIDE_FALLBACK_SNIPPET_CHARS:2400}
  ppt-display-model: ${GENERATION_PPT_DISPLAY_MODEL:deepseek-chat}
  # 关闭自评多级重跑，显著缩短「确认大纲 → 生成正文」总耗时
  self-correction-enabled: ${GENERATION_SELF_CORRECTION_ENABLED:false}
  self-correction-tier1-auto-below: ${GENERATION_SC_T1_AUTO:76}
  self-correction-tier1-fact-below: ${GENERATION_SC_T1_FACT:0.58}
  self-correction-tier2-auto-below: ${GENERATION_SC_T2_AUTO:70}
  self-correction-tier2-fact-below: ${GENERATION_SC_T2_FACT:0.48}
