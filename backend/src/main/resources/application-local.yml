spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ppt_ai
    username: ppt_user
    password: ppt_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
