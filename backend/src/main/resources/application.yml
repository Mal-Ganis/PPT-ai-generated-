spring:
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/ppt_ai
    username: ppt_user
    password: ppt_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
server:
  port: 8080
